<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0f0f1a;color:#eee;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:80px;overflow-x:hidden}
/* HEADER */
.hdr{background:#0f0f1a;padding:20px 16px 12px;border-bottom:1px solid #1e1e2e;position:sticky;top:0;z-index:50}
.hdr h1{font-size:20px;color:#f0c040;font-weight:800;letter-spacing:-0.5px}
.hdr p{font-size:11px;color:#666;margin-top:2px}
/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#12121e;border-top:1px solid #1e1e2e;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bnav button{flex:1;padding:12px 4px 10px;background:none;border:none;color:#555;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:.15s}
.bnav button.on{color:#f0c040}
.bnav button .bico{font-size:20px;line-height:1}
/* PAGES */
.page{display:none;padding:16px}
.page.on{display:block}
/* INPUTS */
.lbl{display:block;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:#666;margin-bottom:5px;margin-top:14px}
.inp{width:100%;background:#1a1a2e;border:1.5px solid #2a2a40;border-radius:10px;color:#eee;font-size:22px;font-weight:600;padding:13px 14px;outline:none;-webkit-appearance:none;font-family:system-ui}
.inp:focus{border-color:#f0c040}
.inp-sm{font-size:15px;padding:10px 12px}
.inp[type=date]{font-size:15px;padding:11px 12px}
/* ETAPAS */
.ets{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-top:6px}
.et{background:#1a1a2e;border:1.5px solid #2a2a40;border-radius:8px;padding:7px 3px;text-align:center;cursor:pointer;transition:.15s}
.et.on{background:rgba(240,192,64,.12);border-color:#f0c040}
.et .el{font-size:8px;color:#666;letter-spacing:.5px;text-transform:uppercase}
.et.on .el{color:#f0c040}
.et .ev{font-size:13px;font-weight:700;color:#fff;margin-top:1px}
.et.on .ev{color:#f0c040}
/* CARDS */
.card{background:#1a1a2e;border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid #1e1e2e}
/* RESULTADOS */
.rg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.rb{border-radius:10px;padding:14px;text-align:center}
.rb .rl{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#aaa;margin-bottom:4px}
.rb .rv{font-size:22px;font-weight:700}
.rb .rs{font-size:10px;color:#aaa;margin-top:2px}
.sem{border-radius:10px;padding:12px 13px;margin-bottom:12px;display:flex;gap:10px;align-items:center;font-size:13px;line-height:1.4}
/* BARRA */
.bar{background:#111;border-radius:20px;height:14px;overflow:hidden;display:flex;margin-bottom:8px}
.bs{height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#000;transition:width .4s}
/* PROGRESO */
.pw{background:#0a0a14;border-radius:20px;height:10px;overflow:hidden;margin:6px 0 4px}
.pf{height:100%;border-radius:20px;background:linear-gradient(90deg,#f0c040,#ffe680);transition:width .5s}
.prow{display:flex;justify-content:space-between;font-size:11px;color:#aaa;margin-top:4px}
/* BTNS */
.btn{width:100%;margin-top:12px;padding:14px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:system-ui}
.btn-gold{background:#f0c040;color:#000}
.btn-gold:active{background:#ffe680}
.btn-ghost{background:#1a1a2e;color:#fff;border:1.5px solid #2a2a40;margin-top:8px}
.btn-ghost:active{border-color:#f0c040}
.btn-sm{padding:7px 13px;font-size:12px;font-weight:700;border-radius:7px;cursor:pointer;border:1.5px solid rgba(240,192,64,.4);background:rgba(240,192,64,.1);color:#f0c040;font-family:system-ui}
/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.st{background:#1a1a2e;border-radius:10px;padding:10px;text-align:center;border:1px solid #1e1e2e}
.sl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#aaa;margin-bottom:3px}
.sv{font-size:17px;font-weight:700;color:#fff}
/* HISTORIAL ITEM */
.hi{background:#1a1a2e;border-radius:10px;padding:12px;margin-bottom:8px;border-left:3px solid #333;border:1px solid #1e1e2e;border-left-width:3px}
.hi.ok{border-left-color:#3ecf8e}
.hi.wn{border-left-color:#f0c040}
.hi.bd{border-left-color:#ff6b6b}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.mbox{background:#12121e;border-radius:18px 18px 0 0;padding:20px 16px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;border-top:1px solid #2a2a40}
/* FLASH */
.flash{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#3ecf8e;color:#000;font-weight:700;font-size:13px;padding:10px 22px;border-radius:30px;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.flash.on{opacity:1}
/* SELECTOR MES */
.mes-sel{background:#1a1a2e;border:1.5px solid #2a2a40;border-radius:8px;color:#fff;font-size:13px;padding:7px 10px;outline:none;-webkit-appearance:none}
/* MÉTRICAS */
.met-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.mg{background:#1a1a2e;border-radius:10px;padding:12px;border:1px solid #1e1e2e}
.mg .ml{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#aaa;margin-bottom:4px}
.mg .mv{font-size:18px;font-weight:700;color:#fff}
/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:#888;font-size:13px;line-height:1.7}
</style>
</head>
<body>

<div class="hdr">
  <h1>💰 Mi Caja</h1>
  <p>Comercio · Argentina · Unipersonal</p>
</div>

<div class="flash" id="flash"></div>

<!-- PAGES -->
<div id="p-cierre" class="page on"></div>
<div id="p-historial" class="page"></div>
<div id="p-metricas" class="page"></div>
<div id="p-config" class="page"></div>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <button class="on" onclick="goTab('cierre',this)"><span class="bico">💵</span>Cierre</button>
  <button onclick="goTab('historial',this)"><span class="bico">📋</span>Historial</button>
  <button onclick="goTab('metricas',this)"><span class="bico">📈</span>Métricas</button>
  <button onclick="goTab('config',this)"><span class="bico">⚙️</span>Config</button>
</nav>

<!-- MODAL -->
<div class="overlay" id="modal" style="display:none">
  <div class="mbox">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span style="font-size:16px;font-weight:700;color:#f0c040" id="modal-title">Nuevo asiento</span>
      <button onclick="closeModal()" style="background:none;border:none;color:#666;font-size:22px;cursor:pointer;padding:4px">✕</button>
    </div>
    <label class="lbl">Fecha</label>
    <input class="inp" type="date" id="m-fecha">
    <label class="lbl">Venta del día ($)</label>
    <input class="inp" type="number" inputmode="numeric" id="m-venta" placeholder="Ej: 150000" oninput="previewModal()">
    <label class="lbl">Etapa</label>
    <div class="ets" id="m-ets"></div>
    <div id="m-preview" style="display:none;border-radius:10px;padding:12px;margin-top:12px;display:none"></div>
    <label class="lbl">Nota (opcional)</label>
    <input class="inp inp-sm" type="text" id="m-nota" placeholder="Feriado, promo, etc.">
    <button class="btn btn-gold" onclick="saveModal()" id="m-savebtn">💾 Guardar</button>
    <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
  </div>
</div>

<script>
// ============ STATE ============
var DEF = {meta:780000, ets:[20000,30000,38000,46000,55000], etAct:0};
var cfg = ls('cx_cfg') || clone(DEF);
var regs = ls('cx_reg') || [];
var etSel = cfg.etAct || 0;
var modalMode = null; // 'new' | 'edit'
var modalEditId = null;
var mEtSel = 0;
var curTab = 'cierre';

var ET_LBL = ['Hoy','Et. B','Et. C','Et. D','Meta'];
var MESES = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

function ls(k){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){return null;} }
function lsSave(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
function clone(o){ return JSON.parse(JSON.stringify(o)); }
function fmt(n){ return Math.round(n).toLocaleString('es-AR'); }
function fmtK(n){ return n>=1000?'$'+Math.round(n/1000)+'k':'$'+n; }
function today(){ return new Date().toISOString().slice(0,10); }
function mesStr(m){ var p=m.split('-'); return MESES[parseInt(p[1])]+' '+p[0]; }
function fechaDisplay(f){ var d=new Date(f+'T12:00:00'); return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit'}); }

function saveCfg(){ cfg.etAct=etSel; lsSave('cx_cfg',cfg); }
function saveRegs(){ lsSave('cx_reg',regs); }

function calcR(v,et){
  var op70=v*.70, reinv=v*.30;
  var base=cfg.ets[et];
  var retiro=base;
  if(op70<base) retiro=Math.max(cfg.ets[0],op70*.40);
  retiro=Math.min(retiro,op70*.65);
  var fondo=op70-retiro;
  var ratio=retiro/base;
  return {v:v,retiro:retiro,op70:op70,reinv:reinv,fondo:fondo,ratio:ratio,base:base};
}

function semData(ratio){
  if(ratio>=.95) return {c:'#3ecf8e',cls:'ok',ico:'✅',msg:'Meta de etapa cumplida.'};
  if(ratio>=.75) return {c:'#f0c040',cls:'wn',ico:'⚠️',msg:'Venta baja. Retiro ajustado.'};
  return {c:'#ff6b6b',cls:'bd',ico:'🔴',msg:'Venta muy baja. Retiro mínimo.'};
}

function flash(m){
  var f=document.getElementById('flash');
  f.textContent=m; f.className='flash on';
  setTimeout(function(){f.className='flash';},2200);
}

// ============ TABS ============
function goTab(id,btn){
  document.querySelectorAll('.page').forEach(function(p){p.className='page';});
  document.querySelectorAll('.bnav button').forEach(function(b){b.className='';});
  document.getElementById('p-'+id).className='page on';
  if(btn) btn.className='on';
  curTab=id;
  if(id==='cierre') renderCierre();
  if(id==='historial') renderHistorial();
  if(id==='metricas') renderMetricas();
  if(id==='config') renderConfig();
}

// ============ CIERRE ============
var cierreVenta='';

function renderCierre(){
  var mesActual=today().slice(0,7);
  var regsMes=regs.filter(function(r){return r.fecha.slice(0,7)===mesActual;});
  var acumMes=regsMes.reduce(function(s,r){return s+r.retiro;},0);
  var c=cierreVenta&&parseFloat(cierreVenta)?calcR(parseFloat(cierreVenta),etSel):null;
  var acumConHoy=acumMes+(c?c.retiro:0);
  var pctMeta=Math.min(Math.round(acumConHoy/cfg.meta*100),100);

  var etHtml=ET_LBL.map(function(lbl,i){
    return '<div class="et'+(etSel===i?' on':'')+'" onclick="setEt('+i+')">'
      +'<div class="el">'+lbl+'</div>'
      +'<div class="ev">'+fmtK(cfg.ets[i])+'</div></div>';
  }).join('');

  var resHtml='<div class="empty">Ingresá el monto del cierre<br>para ver la distribución</div>';
  if(c){
    var sd=semData(c.ratio);
    var ps=(c.retiro/c.v*100).toFixed(1);
    var po=(c.fondo/c.v*100).toFixed(1);
    resHtml=
      '<div class="sem" style="background:'+sd.c+'18;border:1px solid '+sd.c+'40;color:'+sd.c+'"><span style="font-size:20px">'+sd.ico+'</span><span>Podés retirar <b>$'+fmt(c.retiro)+'</b>. '+sd.msg+'</span></div>'
      +'<div class="rg2">'
        +'<div class="rb" style="background:#f0c04020;border:1px solid #f0c04040"><div class="rl">Tu retiro hoy</div><div class="rv" style="color:#f0c040">$'+fmt(c.retiro)+'</div><div class="rs">'+( c.retiro/c.op70*100).toFixed(0)+'% del 70%</div></div>'
        +'<div class="rb" style="background:#3ecf8e20;border:1px solid #3ecf8e40"><div class="rl">Fondo operativo</div><div class="rv" style="color:#3ecf8e">$'+fmt(c.fondo)+'</div><div class="rs">gastos y stock</div></div>'
      +'</div>'
      +'<div class="bar">'
        +'<div class="bs" style="width:'+ps+'%;background:#f0c040">'+(ps>9?ps+'%':'')+'</div>'
        +'<div class="bs" style="width:'+po+'%;background:#9b8fff">'+(po>9?po+'%':'')+'</div>'
        +'<div class="bs" style="width:30%;background:#3ecf8e">30%</div>'
      +'</div>'
      +'<div style="display:flex;gap:12px;font-size:10px;color:#666;margin-bottom:12px"><span>🟡 Sueldo</span><span style="color:#9b8fff">🟣 Op.</span><span style="color:#3ecf8e">🟢 Reinv.</span></div>'
      +'<div class="rg2">'
        +'<div class="rb" style="background:#7eb8ff15;border:1px solid #7eb8ff30"><div class="rl">70% operativo</div><div class="rv" style="color:#7eb8ff">$'+fmt(c.op70)+'</div></div>'
        +'<div class="rb" style="background:#7eb8ff15;border:1px solid #7eb8ff30"><div class="rl">30% reinversión</div><div class="rv" style="color:#7eb8ff">$'+fmt(c.reinv)+'</div></div>'
      +'</div>'
      +'<div class="card">'
        +'<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#666">Meta '+mesStr(mesActual)+'</span><span style="font-size:20px;font-weight:700;color:#f0c040">'+pctMeta+'%</span></div>'
        +'<div class="pw"><div class="pf" style="width:'+pctMeta+'%"></div></div>'
        +'<div class="prow"><span>Acumulado: $'+fmt(acumConHoy)+'</span><span>'+(pctMeta>=100?'¡Meta! 🎉':'Falta $'+fmt(Math.max(cfg.meta-acumConHoy,0)))+'</span></div>'
      +'</div>'
      +'<button class="btn btn-gold" onclick="guardarCierre()">💾 Guardar en historial</button>'
      +'<button class="btn btn-ghost" onclick="limpiarCierre()">Limpiar</button>';
  }

  document.getElementById('p-cierre').innerHTML=
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
      +'<span style="font-size:12px;color:#666">Cierre de hoy</span>'
      +'<button class="btn-sm" onclick="openModal(\'new\')">+ Cargar fecha anterior</button>'
    +'</div>'
    +'<label class="lbl">Venta total del día ($)</label>'
    +'<input class="inp" type="number" inputmode="numeric" placeholder="Ej: 150000" value="'+cierreVenta+'" oninput="onVentaChange(this.value)" id="venta-inp">'
    +'<label class="lbl" style="margin-top:14px">Etapa del plan</label>'
    +'<div class="ets">'+etHtml+'</div>'
    +'<div style="margin-top:16px">'+resHtml+'</div>';
}

function onVentaChange(v){ cierreVenta=v; if(window._vt) clearTimeout(window._vt); window._vt=setTimeout(function(){renderCierre();},400); }
function setEt(i){ etSel=i; saveCfg(); renderCierre(); }

function guardarCierre(){
  if(!cierreVenta||!parseFloat(cierreVenta)) return;
  var c=calcR(parseFloat(cierreVenta),etSel);
  var d=today();
  regs.unshift({id:Date.now(),fecha:d,fechaDisplay:fechaDisplay(d),nota:'',etapa:etSel,v:c.v,retiro:c.retiro,op70:c.op70,reinv:c.reinv,fondo:c.fondo,ratio:c.ratio,base:c.base});
  regs.sort(function(a,b){return b.fecha.localeCompare(a.fecha);});
  saveRegs();
  cierreVenta='';
  flash('✓ Cierre guardado');
  renderCierre();
}

function limpiarCierre(){ cierreVenta=''; renderCierre(); }

// ============ HISTORIAL ============
var filtroMes='2026-04';

function renderHistorial(){
  var mesesDisp=[...new Set(regs.map(function(r){return r.fecha.slice(0,7);}))].sort(function(a,b){return b.localeCompare(a);});
  if(!mesesDisp.length) mesesDisp=[today().slice(0,7)];
  if(mesesDisp.indexOf(filtroMes)<0) filtroMes=mesesDisp[0];

  var mesOpts=mesesDisp.map(function(m){return '<option value="'+m+'"'+(m===filtroMes?' selected':'')+'>'+mesStr(m)+'</option>';}).join('');
  var rMes=regs.filter(function(r){return r.fecha.slice(0,7)===filtroMes;});
  var totRet=rMes.reduce(function(s,r){return s+r.retiro;},0);
  var totV=rMes.reduce(function(s,r){return s+r.v;},0);
  var prom=rMes.length?totRet/rMes.length:0;
  var pct=Math.min(Math.round(totRet/cfg.meta*100),100);

  var progHtml=rMes.length?
    '<div class="card">'
      +'<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#666">Meta '+mesStr(filtroMes)+'</span><span style="font-size:20px;font-weight:700;color:#f0c040">'+pct+'%</span></div>'
      +'<div class="pw"><div class="pf" style="width:'+pct+'%"></div></div>'
      +'<div class="prow"><span>$'+fmt(totRet)+' de $'+fmt(cfg.meta)+'</span><span>'+(pct>=100?'¡Meta lograda! 🎉':'Falta $'+fmt(Math.max(cfg.meta-totRet,0)))+'</span></div>'
    +'</div>':'';

  var listaHtml=rMes.length?rMes.map(function(r){
    var sd=semData(r.ratio);
    var pv=(r.retiro/r.v*100).toFixed(0);
    return '<div class="hi '+sd.cls+'">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start">'
        +'<div>'
          +'<div style="font-size:12px;color:#888">'+r.fechaDisplay+' · '+ET_LBL[r.etapa]+'</div>'
          +'<div style="font-size:13px;color:#fff;font-weight:600;margin-top:2px">Venta: $'+fmt(r.v)+'</div>'
          +(r.nota?'<div style="font-size:11px;color:#666;margin-top:2px;font-style:italic">"'+r.nota+'"</div>':'')
        +'</div>'
        +'<div style="display:flex;gap:6px;align-items:center">'
          +'<div style="text-align:right">'
            +'<div style="font-size:16px;font-weight:700;color:'+sd.c+'">$'+fmt(r.retiro)+'</div>'
            +'<div style="font-size:10px;color:#666">'+pv+'% venta</div>'
          +'</div>'
          +'<button onclick="openModal(\'edit\','+r.id+')" style="background:none;border:none;color:#888;font-size:18px;cursor:pointer;padding:4px">✏️</button>'
          +'<button onclick="delReg('+r.id+')" style="background:none;border:none;color:#444;font-size:16px;cursor:pointer;padding:4px">🗑</button>'
        +'</div>'
      +'</div>'
    +'</div>';
  }).join(''):'<div class="empty">Sin registros para '+mesStr(filtroMes)+'.<br>Usá "+ Cargar fecha anterior" para<br>ingresar cierres de este mes.</div>';

  document.getElementById('p-historial').innerHTML=
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
      +'<select class="mes-sel" onchange="filtroMes=this.value;renderHistorial()">'+mesOpts+'</select>'
      +'<button class="btn-sm" onclick="openModal(\'new\')">+ Nuevo asiento</button>'
    +'</div>'
    +'<div class="stats">'
      +'<div class="st"><div class="sl">Días</div><div class="sv">'+rMes.length+'</div></div>'
      +'<div class="st"><div class="sl">Prom/día</div><div class="sv" style="color:#f0c040">'+(rMes.length?'$'+fmt(prom):'—')+'</div></div>'
      +'<div class="st"><div class="sl">Acumulado</div><div class="sv" style="color:#3ecf8e;font-size:14px">'+(rMes.length?'$'+fmt(totRet):'—')+'</div></div>'
    +'</div>'
    +progHtml
    +listaHtml;
}

function delReg(id){
  if(!confirm('¿Eliminar este registro?')) return;
  regs=regs.filter(function(r){return r.id!==id;});
  saveRegs();
  renderHistorial();
  flash('🗑 Eliminado');
}

// ============ MÉTRICAS ============
function renderMetricas(){
  var mesesDisp=[...new Set(regs.map(function(r){return r.fecha.slice(0,7);}))].sort(function(a,b){return b.localeCompare(a);});
  if(!mesesDisp.length) mesesDisp=[today().slice(0,7)];
  if(mesesDisp.indexOf(filtroMes)<0) filtroMes=mesesDisp[0];

  var rMes=regs.filter(function(r){return r.fecha.slice(0,7)===filtroMes;});
  var mesOpts=mesesDisp.map(function(m){return '<option value="'+m+'"'+(m===filtroMes?' selected':'')+'>'+mesStr(m)+'</option>';}).join('');

  if(!rMes.length){
    document.getElementById('p-metricas').innerHTML=
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
        +'<span style="font-size:14px;font-weight:700;color:#f0c040">Métricas</span>'
        +'<select class="mes-sel" onchange="filtroMes=this.value;renderMetricas()">'+mesOpts+'</select>'
      +'</div>'
      +'<div class="empty">Sin datos para '+mesStr(filtroMes)+'.</div>';
    return;
  }

  var totRet=rMes.reduce(function(s,r){return s+r.retiro;},0);
  var totV=rMes.reduce(function(s,r){return s+r.v;},0);
  var totReinv=rMes.reduce(function(s,r){return s+r.reinv;},0);
  var totFondo=rMes.reduce(function(s,r){return s+r.fondo;},0);
  var prom=totRet/rMes.length;
  var promV=totV/rMes.length;
  var pct=Math.min(Math.round(totRet/cfg.meta*100),100);
  var proy=prom*26;
  var proyPct=Math.min(Math.round(proy/cfg.meta*100),100);
  var dias=rMes.length;
  var ok=rMes.filter(function(r){return r.ratio>=.95;}).length;
  var wn=rMes.filter(function(r){return r.ratio>=.75&&r.ratio<.95;}).length;
  var bd=rMes.filter(function(r){return r.ratio<.75;}).length;

  document.getElementById('p-metricas').innerHTML=
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
      +'<span style="font-size:14px;font-weight:700;color:#f0c040">Métricas</span>'
      +'<select class="mes-sel" onchange="filtroMes=this.value;renderMetricas()">'+mesOpts+'</select>'
    +'</div>'

    // RESUMEN
    +'<div class="met-grid">'
      +'<div class="mg"><div class="ml">Días registrados</div><div class="mv">'+dias+' / 26</div></div>'
      +'<div class="mg"><div class="ml">Venta total</div><div class="mv" style="color:#7eb8ff">$'+fmt(totV)+'</div></div>'
      +'<div class="mg"><div class="ml">Retiro total</div><div class="mv" style="color:#f0c040">$'+fmt(totRet)+'</div></div>'
      +'<div class="mg"><div class="ml">Reinversión</div><div class="mv" style="color:#3ecf8e">$'+fmt(totReinv)+'</div></div>'
      +'<div class="mg"><div class="ml">Venta prom/día</div><div class="mv" style="color:#7eb8ff">$'+fmt(promV)+'</div></div>'
      +'<div class="mg"><div class="ml">Retiro prom/día</div><div class="mv" style="color:#f0c040">$'+fmt(prom)+'</div></div>'
    +'</div>'

    // META
    +'<div class="card">'
      +'<div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#666;margin-bottom:8px">Progreso meta mensual</div>'
      +'<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:13px;color:#eee">$'+fmt(totRet)+' cobrado</span><span style="font-size:22px;font-weight:700;color:#f0c040">'+pct+'%</span></div>'
      +'<div class="pw"><div class="pf" style="width:'+pct+'%"></div></div>'
      +'<div style="font-size:11px;color:#666;margin-top:4px">Meta: $'+fmt(cfg.meta)+'</div>'
    +'</div>'

    // PROYECCIÓN
    +'<div class="card">'
      +'<div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#666;margin-bottom:8px">Proyección al cierre del mes</div>'
      +'<div style="font-size:26px;font-weight:700;color:'+(proy>=cfg.meta?'#3ecf8e':'#f0c040');'margin-bottom:4px">$'+fmt(proy)+'</div>'
      +'<div style="font-size:11px;color:#666;margin-bottom:8px">Basado en promedio de '+dias+' día'+(dias>1?'s':'')+(26-dias>0?' · '+(26-dias)+' días restantes':'')+'</div>'
      +'<div class="pw"><div style="height:100%;width:'+proyPct+'%;background:'+(proy>=cfg.meta?'linear-gradient(90deg,#3ecf8e,#7effc5)':'linear-gradient(90deg,#f0c040,#ffe680)')+';border-radius:20px;transition:width .5s"></div></div>'
      +'<div style="font-size:12px;color:'+(proy>=cfg.meta?'#3ecf8e':'#f0c040')+';margin-top:6px">'+(proy>=cfg.meta?'✅ En camino a superar la meta':'⚠️ Falta $'+fmt(cfg.meta-proy)+' para la meta')+'</div>'
    +'</div>'

    // DÍAS
    +'<div class="card">'
      +'<div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#666;margin-bottom:10px">Días por resultado</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">'
        +'<div style="background:#3ecf8e15;border:1px solid #3ecf8e30;border-radius:10px;padding:10px;text-align:center"><div style="font-size:18px">✅</div><div style="font-size:24px;font-weight:700;color:#3ecf8e;margin:4px 0">'+ok+'</div><div style="font-size:9px;color:#666;text-transform:uppercase;letter-spacing:1px">Meta OK</div></div>'
        +'<div style="background:#f0c04015;border:1px solid #f0c04030;border-radius:10px;padding:10px;text-align:center"><div style="font-size:18px">⚠️</div><div style="font-size:24px;font-weight:700;color:#f0c040;margin:4px 0">'+wn+'</div><div style="font-size:9px;color:#666;text-transform:uppercase;letter-spacing:1px">Ajustado</div></div>'
        +'<div style="background:#ff6b6b15;border:1px solid #ff6b6b30;border-radius:10px;padding:10px;text-align:center"><div style="font-size:18px">🔴</div><div style="font-size:24px;font-weight:700;color:#ff6b6b;margin:4px 0">'+bd+'</div><div style="font-size:9px;color:#666;text-transform:uppercase;letter-spacing:1px">Bajo</div></div>'
      +'</div>'
    +'</div>'

    // DISTRIBUCIÓN
    +'<div class="card">'
      +'<div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#666;margin-bottom:10px">Distribución real del mes</div>'
      +[{l:'Tu retiro',v:totRet,c:'#f0c040'},{l:'Fondo operativo',v:totFondo,c:'#9b8fff'},{l:'Reinversión 30%',v:totReinv,c:'#3ecf8e'}].map(function(m,i){
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;'+(i<2?'border-bottom:1px solid #1e1e2e':'')+'">'
          +'<div style="display:flex;align-items:center;gap:8px"><div style="width:9px;height:9px;border-radius:50%;background:'+m.c+'"></div><span style="font-size:13px;color:#ccc">'+m.l+'</span></div>'
          +'<div style="text-align:right"><div style="font-size:14px;font-weight:700;color:'+m.c+'">$'+fmt(m.v)+'</div><div style="font-size:10px;color:#666">'+(m.v/totV*100).toFixed(1)+'%</div></div>'
        +'</div>';
      }).join('')
    +'</div>';
}

// ============ CONFIG ============
function renderConfig(){
  document.getElementById('p-config').innerHTML=
    '<label class="lbl">Meta mensual ($)</label>'
    +'<input class="inp" type="number" inputmode="numeric" placeholder="780000" value="'+(cfg.meta||'')+'" onchange="cfg.meta=parseFloat(this.value)||780000;saveCfg()">'
    +ET_LBL.map(function(lbl,i){
      return '<label class="lbl">Retiro diario — '+lbl+' ($)</label>'
        +'<input class="inp" type="number" inputmode="numeric" placeholder="'+DEF.ets[i]+'" value="'+(cfg.ets[i]||'')+'" onchange="cfg.ets['+i+']=parseFloat(this.value)||'+DEF.ets[i]+';saveCfg()">';
    }).join('')
    +'<div style="margin-top:14px;background:#1a1a2e;border-radius:10px;padding:12px;font-size:12px;color:#555;line-height:1.8">'
      +'💾 Datos guardados en el teléfono.<br>'
      +'No se borran al cerrar la app.<br><br>'
      +'<b style="color:#888">Instalar como app:</b><br>'
      +'Chrome → ⋮ → "Agregar a pantalla de inicio"'
    +'</div>'
    +'<button class="btn btn-ghost" style="margin-top:12px;color:#ff6b6b" onclick="if(confirm(\'¿Borrar todos los registros?\')){regs=[];saveRegs();flash(\'🗑 Borrado\');}">🗑 Borrar todos los registros</button>';
}

// ============ MODAL ============
function openModal(mode, id){
  modalMode=mode;
  modalEditId=id||null;
  document.getElementById('modal-title').textContent=mode==='edit'?'✏️ Editar asiento':'➕ Nuevo asiento';
  document.getElementById('m-savebtn').textContent=mode==='edit'?'💾 Guardar cambios':'💾 Guardar asiento';

  var fecha=today(), venta='', nota='';
  mEtSel=etSel;

  if(mode==='edit'&&id){
    var r=regs.find(function(r){return r.id===id;});
    if(r){ fecha=r.fecha; venta=String(r.v); nota=r.nota||''; mEtSel=r.etapa; }
  }

  document.getElementById('m-fecha').value=fecha;
  document.getElementById('m-venta').value=venta;
  document.getElementById('m-nota').value=nota;
  renderModalEts();
  previewModal();
  document.getElementById('modal').style.display='flex';
}

function renderModalEts(){
  document.getElementById('m-ets').innerHTML=ET_LBL.map(function(lbl,i){
    return '<div class="et'+(mEtSel===i?' on':'')+'" onclick="mEtSel='+i+';renderModalEts();previewModal()">'
      +'<div class="el">'+lbl+'</div><div class="ev">'+fmtK(cfg.ets[i])+'</div></div>';
  }).join('');
}

function previewModal(){
  var vStr=document.getElementById('m-venta').value;
  var v=parseFloat(vStr);
  var box=document.getElementById('m-preview');
  if(!v||v<=0){ box.style.display='none'; return; }
  var c=calcR(v,mEtSel);
  var sd=semData(c.ratio);
  box.style.cssText='border-radius:10px;padding:12px;margin-top:12px;display:flex;justify-content:space-between;background:'+sd.c+'15;border:1px solid '+sd.c+'30';
  box.innerHTML='<div><div style="font-size:10px;color:#888">Retiro calculado</div><div style="font-size:22px;font-weight:700;color:'+sd.c+'">$'+fmt(c.retiro)+'</div></div>'
    +'<div><div style="font-size:10px;color:#888">Fondo op.</div><div style="font-size:22px;font-weight:700;color:#7eb8ff">$'+fmt(c.fondo)+'</div></div>';
}

function closeModal(){ document.getElementById('modal').style.display='none'; }

function saveModal(){
  var fechaVal=document.getElementById('m-fecha').value;
  var ventaVal=parseFloat(document.getElementById('m-venta').value);
  if(!fechaVal||!ventaVal) return;
  var nota=document.getElementById('m-nota').value;
  var c=calcR(ventaVal,mEtSel);
  var reg={id:modalEditId&&modalMode==='edit'?modalEditId:Date.now(),fecha:fechaVal,fechaDisplay:fechaDisplay(fechaVal),nota:nota,etapa:mEtSel,v:c.v,retiro:c.retiro,op70:c.op70,reinv:c.reinv,fondo:c.fondo,ratio:c.ratio,base:c.base};

  if(modalMode==='edit'&&modalEditId){
    regs=regs.map(function(r){return r.id===modalEditId?reg:r;});
    flash('✓ Registro actualizado');
  } else {
    regs.unshift(reg);
    flash('✓ Asiento guardado');
  }
  regs.sort(function(a,b){return b.fecha.localeCompare(a.fecha);});
  saveRegs();
  closeModal();
  if(curTab==='historial') renderHistorial();
  if(curTab==='metricas') renderMetricas();
  if(curTab==='cierre') renderCierre();
}

// ============ INIT ============
renderCierre();
document.getElementById('modal').addEventListener('click',function(e){ if(e.target===this) closeModal(); });
</script>
</body>
</html>
